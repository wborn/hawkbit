name: Docker Image

on:
  release:
    types: [published]
  push:
    branches:
      - main
    tags-ignore:
      - "*.*"
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image_hawkbit:
    runs-on: ubuntu-latest
    env:
      PLATFORM: linux/amd64,linux/arm64
      IMAGE_NAME: openremote/hawkbit-update-server

    steps:
      - name: Set tags
        id: set-tags
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "DOCKER_TAG_ARGS=-t ${IMAGE_NAME}:develop" >> "$GITHUB_ENV"
            echo "dockerImage=${IMAGE_NAME}:develop" >> "$GITHUB_OUTPUT"
          else
            echo "DOCKER_TAG_ARGS=-t ${IMAGE_NAME}:latest -t ${IMAGE_NAME}:$RELEASE_TAG" >> "$GITHUB_ENV"
            echo "dockerImage=${IMAGE_NAME}:$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3
        with:
          platforms: all

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3
        with:
          version: latest
          install: true

      - name: Available platforms
        run: echo "${{ steps.buildx.outputs.platforms }}"

      - name: Login to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          username: ${{ secrets._TEMP_DOCKERHUB_USER }}
          password: ${{ secrets._TEMP_DOCKERHUB_PASSWORD }}

      - name: Build and push images
        run: |
          docker build --build-arg GIT_COMMIT=${{ github.sha }} --push --platform $PLATFORM $DOCKER_TAG_ARGS .

      - name: Scan hawkbit docker image
        uses: anchore/scan-action@3c9a191a0fbab285ca6b8530b5de5a642cba332f # v7.2.2
        id: anchore-scan
        with:
          image: ${{ steps.set-tags.outputs.dockerImage }}
          fail-build: false
          severity-cutoff: critical

      - name: Upload Anchore scan SARIF report
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@c8e3174949dcd2ceb71718aeaa53fee4dc9052f2 # v4.31.7
        with:
          sarif_file: ${{ steps.anchore-scan.outputs.sarif }}

      - name: Inspect Anchore scan SARIF report
        if: ${{ !cancelled() }}
        run: cat "${{ steps.anchore-scan.outputs.sarif }}"
